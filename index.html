<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="โดสยาเด็ก">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<title>คำนวณโดสยาเด็ก</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#F7F8FA;
    --surface:#FFFFFF;
    --border:#E5E7EB;
    --border2:#D1D5DB;
    --text:#111827;
    --text2:#6B7280;
    --text3:#9CA3AF;
    --blue-bg:#EFF6FF;
    --blue-border:#BFDBFE;
    --blue-text:#1D4ED8;
    --warn-bg:#FFFBEB;
    --warn-border:#FDE68A;
    --warn-text:#92400E;
    --danger-bg:#FEF2F2;
    --danger-border:#FECACA;
    --danger-text:#991B1B;
    --green-bg:#F0FDF4;
    --green-border:#BBF7D0;
    --green-text:#166534;
    --radius:12px;
    --radius-sm:8px;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#0F172A;
      --surface:#1E293B;
      --border:#334155;
      --border2:#475569;
      --text:#F1F5F9;
      --text2:#94A3B8;
      --text3:#64748B;
      --blue-bg:#1E3A5F;
      --blue-border:#1E40AF;
      --blue-text:#93C5FD;
      --warn-bg:#451A03;
      --warn-border:#92400E;
      --warn-text:#FCD34D;
      --danger-bg:#450A0A;
      --danger-border:#991B1B;
      --danger-text:#FCA5A5;
      --green-bg:#052E16;
      --green-border:#166534;
      --green-text:#86EFAC;
    }
  }
  html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:16px;line-height:1.5;min-height:100vh}
  .container{max-width:540px;margin:0 auto;padding:16px 16px 48px}
  header{text-align:center;padding:20px 0 24px}
  header h1{font-size:20px;font-weight:600;color:var(--text);letter-spacing:-0.3px}
  header p{font-size:13px;color:var(--text2);margin-top:4px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
  .card-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px}
  .field{margin-bottom:12px}
  .field:last-child{margin-bottom:0}
  label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px}
  input[type=number],input[type=text]{
    width:100%;padding:11px 14px;font-size:16px;
    border:1px solid var(--border2);border-radius:var(--radius-sm);
    background:var(--bg);color:var(--text);
    -webkit-appearance:none;appearance:none;
    outline:none;transition:border-color .15s;
  }
  input:focus{border-color:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .search-wrap{position:relative}
  .clear-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:50%;background:var(--text3);color:var(--surface);border:none;font-size:14px;line-height:1;cursor:pointer;display:none;align-items:center;justify-content:center;padding:0}
  .clear-btn.show{display:flex}
  #drug-search{padding-right:42px}
  .dropdown{
    position:absolute;top:calc(100% + 4px);left:0;right:0;
    background:var(--surface);border:1px solid var(--border2);
    border-radius:var(--radius-sm);z-index:100;
    max-height:240px;overflow-y:auto;display:none;
    box-shadow:0 8px 24px rgba(0,0,0,.12);
  }
  .dropdown.open{display:block}
  .dd-item{padding:12px 14px;font-size:15px;cursor:pointer;color:var(--text);border-bottom:1px solid var(--border)}
  .dd-item:last-child{border-bottom:none}
  .dd-item:active{background:var(--bg)}
  .dd-item small{display:block;font-size:12px;color:var(--text3);margin-top:2px}
  .result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
  .result-header{padding:14px 16px 12px;border-bottom:1px solid var(--border)}
  .result-drug{font-size:16px;font-weight:600;color:var(--text)}
  .result-meta{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
  .tag{display:inline-block;font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px;background:var(--bg);color:var(--text2);border:1px solid var(--border)}
  .badge-safe{background:var(--green-bg);color:var(--green-text);border-color:var(--green-border)}
  .badge-warn{background:var(--warn-bg);color:var(--warn-text);border-color:var(--warn-border)}
  .ml-box{background:var(--blue-bg);border-bottom:1px solid var(--blue-border);padding:16px}
  .ml-label{font-size:12px;font-weight:600;color:var(--blue-text);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .ml-value{font-size:36px;font-weight:700;color:var(--blue-text);letter-spacing:-1px;line-height:1}
  .ml-unit{font-size:18px;font-weight:500;color:var(--blue-text);margin-left:4px}
  .ml-sub{font-size:13px;color:var(--blue-text);opacity:.75;margin-top:6px}
  .rows{padding:12px 16px}
  .row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
  .row:last-child{border-bottom:none}
  .row-label{font-size:13px;color:var(--text2)}
  .row-val{font-size:14px;font-weight:500;color:var(--text);text-align:right}
  .row-sub{font-size:11px;color:var(--text3);margin-top:1px;text-align:right}
  .note-box{padding:12px 16px;background:var(--bg);border-top:1px solid var(--border);font-size:13px;color:var(--text2);line-height:1.5}
  .alert{padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;margin:10px 16px 0;display:flex;gap:8px;align-items:flex-start}
  .alert-danger{background:var(--danger-bg);color:var(--danger-text);border:1px solid var(--danger-border)}
  .alert-warn{background:var(--warn-bg);color:var(--warn-text);border:1px solid var(--warn-border)}
  .empty-state{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px}
  .empty-icon{font-size:32px;margin-bottom:8px}
  .disclaimer{background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:var(--radius);padding:14px 16px;font-size:12px;color:var(--warn-text);line-height:1.6;margin-top:8px}
  .disclaimer strong{font-weight:600}
  @media(max-width:360px){
    .ml-value{font-size:28px}
    .grid2{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>💊 คำนวณโดสยาเด็ก</h1>
    <p>คำนวณปริมาณยาน้ำตามน้ำหนักตัว</p>
  </header>

  <div class="card">
    <div class="card-title">ข้อมูลผู้ป่วย</div>
    <div class="grid2">
      <div class="field">
        <label>น้ำหนัก (kg)</label>
        <input type="number" id="weight" inputmode="decimal" min="1" max="100" step="0.1" placeholder="เช่น 15" oninput="calc()">
      </div>
      <div class="field">
        <label>อายุ (ปี)</label>
        <input type="number" id="age" inputmode="decimal" min="0" max="18" step="0.5" placeholder="เช่น 3" oninput="calc()">
      </div>
    </div>
    <div class="field">
      <label>ชื่อยา</label>
      <div class="search-wrap">
        <input type="text" id="drug-search" placeholder="พิมชื่อยา เช่น para, amox, ibu..." autocomplete="off" autocorrect="off" autocapitalize="off" oninput="onSearch()" onfocus="onSearchFocus()">
        <button class="clear-btn" id="clear-btn" onclick="clearSearch()" aria-label="ล้าง">✕</button>
        <div class="dropdown" id="dropdown"></div>
      </div>
    </div>
  </div>

  <div id="results-area">
    <div class="card">
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div>พิมชื่อยาเพื่อเริ่มคำนวณ</div>
      </div>
    </div>
  </div>

  <div class="disclaimer">
    <strong>⚠️ คำเตือน:</strong> ข้อมูลนี้เป็นเพียงแนวทางเบื้องต้น การใช้ยาในเด็กควรอยู่ภายใต้การดูแลของแพทย์หรือเภสัชกรเสมอ โดยเฉพาะในเด็กอายุน้อยกว่า 2 ปี หรือผู้ป่วยที่มีโรคประจำตัว
  </div>
</div>

<script>
const allDrugs = [

let selected = null;
let deficitPct = 0;
function setDeficit(p){ deficitPct = p; calc(); }

function onSearch(){
  const q = document.getElementById('drug-search').value.trim().toLowerCase();
  document.getElementById('clear-btn').className = q ? 'clear-btn show' : 'clear-btn';
  showDropdown(q);
}
function clearSearch(){
  document.getElementById('drug-search').value = '';
  document.getElementById('clear-btn').className = 'clear-btn';
  document.getElementById('dropdown').className = 'dropdown';
  selected = null;
  calc();
  document.getElementById('drug-search').focus();
}
function onSearchFocus(){
  const q = document.getElementById('drug-search').value.trim().toLowerCase();
  showDropdown(q);
}
function showDropdown(q){
  const dd = document.getElementById('dropdown');
  if(!q){dd.className='dropdown';return;}
  const hits = allDrugs.filter(d=>d.name.toLowerCase().includes(q)||d.alias.some(a=>a.includes(q)));
  if(!hits.length){dd.className='dropdown';return;}
  dd.innerHTML = hits.map(d=>`<div class="dd-item" ontouchstart="" onclick="pick(${allDrugs.indexOf(d)})">${d.name}<small>${d.group} · ${d.form}</small></div>`).join('');
  dd.className='dropdown open';
}
function pick(i){
  selected = allDrugs[i];
  document.getElementById('drug-search').value = selected.name;
  document.getElementById('clear-btn').className = 'clear-btn show';
  document.getElementById('dropdown').className='dropdown';
  calc();
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.search-wrap')) document.getElementById('dropdown').className='dropdown';
});
function rh(n){if(n<1)return Math.round(n*100)/100;if(n<10)return Math.round(n*4)/4;return Math.round(n*2)/2;}
function fm(n){if(n%1===0)return n.toFixed(0);const q=(n*4)%2;if(q!==0&&n<10)return n.toFixed(2).replace(/0$/,"");if(n<1)return n.toFixed(2);return n.toFixed(1);}
function calc(){
  const wt = parseFloat(document.getElementById('weight').value);
  const age = parseFloat(document.getElementById('age').value);
  const area = document.getElementById('results-area');
  if(!selected){
    area.innerHTML='<div class="card"><div class="empty-state"><div class="empty-icon">🔍</div><div>พิมชื่อยาเพื่อเริ่มคำนวณ</div></div></div>';
    return;
  }
  if(!wt||wt<=0){
    area.innerHTML='<div class="card"><div class="empty-state"><div class="empty-icon">⚖️</div><div>กรุณากรอกน้ำหนักของผู้ป่วย</div></div></div>';
    return;
  }
  const d = selected;
  const ageWarn = d.min_age && !isNaN(age) && age < d.min_age;
  const badge = d.safe ? `<span class="tag badge-safe">ปลอดภัย</span>` : `<span class="tag badge-warn">ระวัง</span>`;
  const ageAlert = ageWarn ? `<div class="alert alert-danger">⚠️ ยานี้ไม่แนะนำในเด็กอายุน้อยกว่า ${d.min_age} ปี</div>` : '';

  if(d.iv_fluid) {
    let mlDay = 0, rate = 0;
    if(wt <= 10){ mlDay = wt*100; }
    else if(wt <= 20){ mlDay = 1000 + (wt-10)*50; }
    else { mlDay = 1500 + (wt-20)*20; }
    let breakdown = '';
    if(wt <= 10) breakdown = wt+' kg × 100 ml/kg';
    else if(wt <= 20) breakdown = '(10×100) + ('+(wt-10).toFixed(1)+'×50)';
    else breakdown = '(10×100) + (10×50) + ('+(wt-20).toFixed(1)+'×20)';

    const defLabels = {0:'ไม่มี', 3:'Mild (3%)', 5:'Moderate (5%)', 7:'Severe (7%)'};
    const defMl = deficitPct * wt * 10;
    const totalMl = mlDay + defMl;
    const totalRate = totalMl / 24;

    const defBtns = [0,3,5,7].map(p =>
      `<button onclick="setDeficit(${p})" style="flex:1;padding:8px 4px;font-size:12px;font-weight:500;border-radius:8px;border:1px solid ${deficitPct===p?'#3B82F6':'var(--border2)'};background:${deficitPct===p?'var(--blue-bg)':'var(--surface)'};color:${deficitPct===p?'var(--blue-text)':'var(--text2)'}">${defLabels[p]}</button>`
    ).join('');

    const defRows = deficitPct > 0 ? `
        <div class="row"><div class="row-label">Maintenance</div><div class="row-val">${Math.round(mlDay)} ml/day</div></div>
        <div class="row"><div class="row-label">Deficit (${deficitPct}%)</div><div class="row-val">${Math.round(defMl)} ml</div></div>
        <div class="row"><div class="row-label">รวมทั้งหมด (24 ชม.)</div><div class="row-val">${Math.round(totalMl)} ml</div></div>` : `
        <div class="row"><div class="row-label">ปริมาณรวมต่อวัน</div><div class="row-val">${Math.round(mlDay)} ml/day</div></div>`;

    area.innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <div class="result-drug">${d.name}</div>
        <div class="result-meta"><span class="tag">${d.group}</span><span class="tag badge-safe">${d.conc_label}</span></div>
      </div>
      <div style="padding:12px 16px;border-bottom:1px solid var(--border)">
        <div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">ภาวะขาดน้ำ (Dehydration)</div>
        <div style="display:flex;gap:6px">${defBtns}</div>
      </div>
      <div class="ml-box">
        <div class="ml-label">Rate</div>
        <div><span class="ml-value">${Math.round(totalRate)}</span><span class="ml-unit">ml/hr</span></div>
        <div class="ml-sub">${deficitPct>0 ? 'Maintenance '+Math.round(mlDay)+' + Deficit '+Math.round(defMl)+' ml ใน 24 ชม.' : breakdown}</div>
      </div>
      <div class="rows">${defRows}
        <div class="row"><div class="row-label">การให้</div><div class="row-val">${d.freq}</div></div>
      </div>
      <div class="note-box">ℹ️ ${d.note} | Deficit (ml) = %dehydration × นน. × 10 — กรณี severe พิจารณา bolus NSS 10–20 ml/kg ก่อน และหักลบจาก deficit</div>
    </div>`;
    return;
  }

  if(d.regimen) {
    const rows = d.regimen.map(r => {
      const mg = Math.min(r.dose*wt, r.max);
      const ml = rh(mg/d.conc);
      return `<div class="row">
        <div class="row-label">${r.label} · ${r.dose} mg/kg</div>
        <div style="text-align:right">
          <div class="row-val">${fm(ml)} ml</div>
          <div class="row-sub">${fm(mg)} mg${r.dose*wt>r.max?' (max '+r.max+')':''}</div>
        </div>
      </div>`;
    }).join('');
    const first = d.regimen[0];
    const firstMg = Math.min(first.dose*wt, first.max);
    const firstMl = rh(firstMg/d.conc);
    area.innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <div class="result-drug">${d.name}</div>
        <div class="result-meta"><span class="tag">${d.group}</span><span class="tag badge-safe">ปลอดภัย</span><span class="tag">${d.conc_label}</span></div>
      </div>
      <div class="ml-box">
        <div class="ml-label">วันแรก (Loading)</div>
        <div><span class="ml-value">${fm(firstMl)}</span><span class="ml-unit">ml</span></div>
        <div class="ml-sub">${fm(firstMg)} mg · ${first.dose} mg/kg/dose × ${wt} kg</div>
      </div>
      <div class="rows">
        <div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:8px 0 4px">ตารางการให้ยา</div>
        ${rows}
        <div class="row"><div class="row-label">ความถี่</div><div class="row-val">${d.freq}</div></div>
      </div>
      <div class="note-box">ℹ️ ${d.note}</div>
    </div>`;
    return;
  }

  if(d.age_based) {
    if(isNaN(age)||age<=0){
      area.innerHTML='<div class="card"><div class="empty-state"><div class="empty-icon">🎂</div><div>ยานี้คำนวณตามอายุ — กรุณากรอกอายุของผู้ป่วย</div></div></div>';
      return;
    }
    const ageGroup = d.age_doses.find(g => age >= g.min_age && age < g.max_age);
    if(!ageGroup){
      area.innerHTML='<div class="card"><div class="empty-state"><div class="empty-icon">⚠️</div><div>อายุไม่อยู่ในช่วงที่กำหนด กรุณาปรึกษาแพทย์</div></div></div>';
      return;
    }
    const mgDose = ageGroup.dose;
    const mgDoseMax = ageGroup.dose_max || ageGroup.dose;
    const mlDose = rh(mgDose/d.conc);
    const mlDoseMax = rh(mgDoseMax/d.conc);
    const mlDisp = mlDose===mlDoseMax ? mlDose.toFixed(1) : mlDose.toFixed(1)+'–'+mlDoseMax.toFixed(1);
    const mgDisp = mgDose===mgDoseMax ? mgDose : mgDose+'–'+mgDoseMax;
    const grpLabel = ageGroup.label || ('อายุ '+ageGroup.min_age+'–'+ageGroup.max_age+' ปี');
    const maxDayRow = ageGroup.max_day ? '<div class="row"><div class="row-label">สูงสุดต่อวัน</div><div class="row-val">'+ageGroup.max_day+' mg/day</div></div>' : '';
    const freqDisp = ageGroup.freq_override || d.freq;
    area.innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <div class="result-drug">${d.name}</div>
        <div class="result-meta"><span class="tag">${d.group}</span>${badge}<span class="tag">${d.conc_label}</span></div>
      </div>
      <div class="ml-box">
        <div class="ml-label">ปริมาณต่อครั้ง</div>
        <div><span class="ml-value">${mlDisp}</span><span class="ml-unit">ml</span></div>
        <div class="ml-sub">${mgDisp} mg · ${grpLabel}</div>
      </div>
      ${ageAlert}
      <div class="rows">
        <div class="row"><div class="row-label">ความถี่</div><div class="row-val">${freqDisp}</div></div>
        ${maxDayRow}
      </div>
      <div class="note-box">ℹ️ ${d.note}</div>
    </div>`;
    return;
  }

  const mgMin = Math.min(d.min_dose*wt, d.max_single);
  const mgMax = Math.min(d.max_dose*wt, d.max_single);
  const maxDailyMg = Math.min(d.max_daily_kg*wt, d.max_single*4);
  const mlMin = rh(mgMin/d.conc);
  const mlMax = rh(mgMax/d.conc);
  const mlDaily = rh(maxDailyMg/d.conc);
  const mlStr = mlMin===mlMax ? `${fm(mlMin)}` : `${fm(mlMin)}–${fm(mlMax)}`;
  const mgStr = mlMin===mlMax ? `${fm(mgMin)}` : `${fm(mgMin)}–${fm(mgMax)}`;
  const doseStr = d.min_dose===d.max_dose ? `${d.min_dose}` : `${d.min_dose}–${d.max_dose}`;
  const overMax = d.max_dose*wt >= d.max_single;
  const maxAlert = overMax ? `<div class="alert alert-warn">⚠️ โดสเกิน max — ใช้ไม่เกิน ${(d.max_single/d.conc).toFixed(1)} ml ต่อครั้ง</div>` : '';

  area.innerHTML = `
  <div class="result-card">
    <div class="result-header">
      <div class="result-drug">${d.name}</div>
      <div class="result-meta">
        <span class="tag">${d.group}</span>
        ${badge}
        <span class="tag">${d.conc_label}</span>
      </div>
    </div>
    <div class="ml-box">
      <div class="ml-label">ปริมาณต่อครั้ง</div>
      ${d.mg_only
        ? `<div><span class="ml-value">${mgStr}</span><span class="ml-unit">mg</span></div>
           <div class="ml-sub">${doseStr} mg/kg/dose × ${wt} kg</div>`
        : `<div><span class="ml-value">${mlStr}</span><span class="ml-unit">ml</span></div>
           <div class="ml-sub">${mgStr} mg &nbsp;·&nbsp; ${doseStr} mg/kg/dose × ${wt} kg</div>`}
    </div>
    ${ageAlert}${maxAlert}
    <div class="rows">
      <div class="row">
        <div class="row-label">ความถี่</div>
        <div class="row-val">${d.freq}</div>
      </div>
      <div class="row">
        <div class="row-label">สูงสุดต่อวัน</div>
        <div>
          ${d.mg_only
            ? `<div class="row-val">${fm(maxDailyMg)} mg/day</div>
               <div class="row-sub">max ${d.max_daily_kg} mg/kg/day</div>`
            : `<div class="row-val">${mlDaily.toFixed(1)} ml/day</div>
               <div class="row-sub">${fm(maxDailyMg)} mg · max ${d.max_daily_kg} mg/kg/day</div>`}
        </div>
      </div>
    </div>
    <div class="note-box">ℹ️ ${d.note}</div>
  </div>`;
}
</script>
</body>
</html>
